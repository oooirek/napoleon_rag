repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: ruff check --fix
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format
        language: system
        types: [python]
        pass_filenames: true
